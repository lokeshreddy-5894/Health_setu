name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Prepare static site bundle
        shell: bash
        run: |
          mkdir -p _site
          # Use find instead of globs so missing file types don't cause errors
          find . -maxdepth 1 -name "*.html" -exec cp -v {} _site/ \;
          find . -maxdepth 1 -name "*.css"  -exec cp -v {} _site/ \;
          find . -maxdepth 1 -name "*.js"   -exec cp -v {} _site/ \;
          # Copy the scripts subfolder (used by db.js / lint at runtime)
          if [ -d scripts ]; then cp -r scripts _site/scripts; fi
          echo "Published files:"
          ls -la _site
          test -f _site/index.html || (echo "ERROR: index.html missing!" && exit 1)

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4