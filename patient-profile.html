<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile — HealthSetu</title>
<link rel="stylesheet" href="styles.css">
<style>
.profile-header { background: linear-gradient(135deg, #0b1f3a 0%, #1a6bff 100%); border-radius: 16px; padding: 32px; display: flex; align-items: center; gap: 24px; margin-bottom: 24px; }
.ph-avatar { width: 72px; height: 72px; border-radius: 50%; background: rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 900; color: white; border: 3px solid rgba(255,255,255,.3); flex-shrink: 0; }
.ph-name { font-size: 24px; font-weight: 800; color: white; }
.ph-email { font-size: 14px; color: rgba(255,255,255,.65); margin-top: 4px; }
.ph-badge { margin-top: 10px; display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,.15); color: white; padding: 5px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; border: 1px solid rgba(255,255,255,.2); }
</style>
</head>
<body>
<div id="topbar-placeholder"></div>
<div class="app-layout">
  <nav class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-section-label">Patient Menu</div>
      <a class="sidebar-link" href="patient-dashboard.html"><span class="s-icon">&#127968;</span> Dashboard</a>
      <a class="sidebar-link" href="patient-appointments.html"><span class="s-icon">&#128197;</span> Appointments</a>
      <a class="sidebar-link" href="patient-medicines.html"><span class="s-icon">&#128138;</span> Medicines</a>
      <a class="sidebar-link" href="patient-health.html"><span class="s-icon">&#129658;</span> Health Data</a>
      <a class="sidebar-link" href="patient-reports.html"><span class="s-icon">&#128196;</span> Reports</a>
      <a class="sidebar-link active" href="patient-profile.html"><span class="s-icon">&#128100;</span> My Profile</a>
    </div>
    <div class="sidebar-footer">
      <button class="btn btn-ghost btn-sm" style="width:100%;justify-content:flex-start;gap:8px;" onclick="HS.clearSession();window.location.href='login-patient.html'">🚪 Sign Out</button>
    </div>
  </nav>
  <div class="main-content">
    <div class="page-header anim-fade-up"><h1>My Profile</h1><p>Your personal information and health settings</p></div>
    <div class="profile-header anim-fade-up-1">
      <div class="ph-avatar" id="ph-avatar">?</div>
      <div>
        <div class="ph-name" id="ph-name">Loading...</div>
        <div class="ph-email" id="ph-email">...</div>
        <div class="ph-badge">🧑‍💼 Patient</div>
      </div>
    </div>
    <div class="two-col anim-fade-up-2">
      <div class="card">
        <div class="card-header"><div class="card-title">Personal Information</div></div>
        <div id="profile-info"></div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title">🩺 Assigned Doctor</div></div>
        <div id="doctor-info"></div>
      </div>
    </div>
  </div>
</div>
<div class="toast-wrap"></div>
<script src="db.js"></script>
<script>
function init() {
  const s = HS.requireAuth('patient');
  if (!s) return;
  const pt = HS.getPatients().find(p => p.id === s.user.id) || s.user;
  document.getElementById('topbar-placeholder').innerHTML = buildTopbar(pt.name, 'patient', '#1a6bff');
  document.getElementById('ph-avatar').textContent = pt.name.charAt(0).toUpperCase();
  document.getElementById('ph-name').textContent = pt.name;
  document.getElementById('ph-email').textContent = pt.email;

  document.getElementById('profile-info').innerHTML = [
    ['👤 Full Name', pt.name],
    ['📧 Email', pt.email],
    ['📞 Contact', pt.contact||'—'],
    ['🏙️ City', pt.city||'—'],
    ['🏠 Address', pt.address||'—'],
    ['📅 Registered', HS.fmtShort(pt.createdAt)],
  ].map(([l,v]) => `<div class="info-row"><span class="info-lbl">${l}</span><span class="info-val">${v}</span></div>`).join('');

  const doc = pt.assignedDoctor ? HS.getDoctors().find(d => d.id === pt.assignedDoctor) : null;
  const di = document.getElementById('doctor-info');
  if (doc) {
    di.innerHTML = `
      <div style="display:flex;align-items:center;gap:16px;padding:18px;background:linear-gradient(135deg,var(--g50),var(--g100));border-radius:12px;margin-bottom:16px;border:1px solid var(--g200);">
        <div style="width:54px;height:54px;border-radius:50%;background:${doc.color};color:white;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;flex-shrink:0;">${doc.name.charAt(0)}</div>
        <div>
          <div style="font-size:16px;font-weight:800;color:var(--g900);">${doc.name}</div>
          <div style="font-size:13px;color:var(--g400);margin-top:3px;">${doc.spec} · ${doc.dept||doc.spec}</div>
        </div>
      </div>
      ${[['📧 Email', doc.email],['📞 Contact', doc.contact||'—'],['🏥 Specialization', doc.spec],['🏢 Department', doc.dept||doc.spec]].map(([l,v]) => `<div class="info-row"><span class="info-lbl">${l}</span><span class="info-val">${v}</span></div>`).join('')}`;
  } else {
    di.innerHTML = '<div class="empty-state" style="padding:36px;"><div class="empty-icon">🩺</div><p>No doctor assigned yet.<br>Please contact hospital admin.</p></div>';
  }
}
init();
</script>
</body>
</html>
